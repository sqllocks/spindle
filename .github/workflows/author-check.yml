name: author-check
on: [push, pull_request]
jobs:
  check-authors:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2
      - name: Check for unauthorized authors
        run: |
          UNAUTHORIZED=$(git log HEAD~1..HEAD --format='%an' | grep -i 'claude' || true)
          if [ -n "$UNAUTHORIZED" ]; then
            echo "ERROR: Found commits authored by 'claude'."
            echo "All commits must be authored by repository maintainers."
            exit 1
          fi
      - name: Check for unauthorized co-authors
        run: |
          COAUTHOR=$(git log HEAD~1..HEAD --format='%B' | grep -i 'co-authored-by.*claude' || true)
          if [ -n "$COAUTHOR" ]; then
            echo "ERROR: Found Co-authored-by trailers referencing 'claude'."
            exit 1
          fi
